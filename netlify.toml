[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every unmatched path serves index.html so React Router
# routes (e.g. /problem/:id, /asana/:problemId/:asanaId) work on direct
# visit and refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
